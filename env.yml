name: resultant_hypothesis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11

  # PyTorch + CUDA
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - jupyterlab
  - notebook

  # Machine Learning
  - scikit-learn
  - xgboost
  - statsmodels

  # Computer Vision
  - opencv
  - pillow

  # Utility
  - tqdm
  - pyyaml
  - requests

  # Development
  - git
  - pip

  # Pip-only packages
  - pip:
      - ultralytics
      - pysyncobj
      - imbalanced-learn
      - tensorboard
      - transformers
      - datasets
      - accelerate
      - sentencepiece

