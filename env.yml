name: resultant_hypothesis

# conda-forge ONLY on purpose:
#  - the old "pytorch" / "nvidia" channels are deprecated for torch (2.5 was the last release there)
#  - dropping "defaults" avoids Intel-MKL, which is the usual source of the
#    libiomp5md.dll / OpenMP "already initialized" conflict on Windows
channels:
  - conda-forge

dependencies:
  # ---- Core Python ----
  - python=3.11
  - pip

  # ---- Core scientific stack ----
  # Force OpenBLAS builds of BLAS/LAPACK. On win-64 conda-forge defaults to MKL,
  # whose libomp.dll clashes with the libiomp5md.dll shipped inside the pip
  # torch wheel (OMP Error #15 at import time).
  - libblas=*=*openblas
  - libcblas=*=*openblas
  - liblapack=*=*openblas
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - jupyterlab
  - notebook

  # ---- Classical ML ----
  - scikit-learn
  - xgboost
  - statsmodels

  # ---- Computer vision (system-level libs) ----
  - opencv
  - pillow

  # ---- Utilities ----
  - tqdm
  - pyyaml
  - requests
  - git

  # ---- Everything below comes from pip ----
  - pip:
      # PyTorch CUDA 12.6 wheels — same source as your working fl-env (x.y.z+cu126).
      # --extra-index-url keeps normal PyPI available for the packages further down.
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch
      - torchvision
      - torchaudio

      # pip-only packages (resolved from normal PyPI)
      - ultralytics
      - pysyncobj
      - imbalanced-learn
      - tensorboard
      - transformers
      - datasets
      - accelerate
      - sentencepiece